name: 钉钉自动消息发送

on:
  schedule:
    # 每个工作日的早上9点发送早间消息 (UTC时间01:00 = 北京时间09:00)
    - cron: '0 1 * * 1-5'
    # 每个工作日的中午12点30分发送午间消息 (UTC时间04:30 = 北京时间12:30)
    - cron: '30 4 * * 1-5'
    # 每个工作日的下午3点发送下午消息 (UTC时间07:00 = 北京时间15:00)
    - cron: '0 7 * * 1-5'
    # 每个工作日的下午5点发送下班消息 (UTC时间09:00 = 北京时间17:00)
    - cron: '0 9 * * 1-5'
  # 允许手动触发测试
  workflow_dispatch:
    inputs:
      message_type:
        description: '消息类型'
        required: true
        default: 'morning'
        type: choice
        options:
        - morning
        - noon
        - afternoon
        - evening

jobs:
  send-auto-message:
    runs-on: ubuntu-latest
    env:
      DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
    steps:
      - name: 发送早间消息
        if: (github.event.schedule == '0 1 * * 1-5') || (github.event_name == 'workflow_dispatch' && github.event.inputs.message_type == 'morning')
        run: |
          # 安装Node.js环境
          curl -sL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs
          
          # 创建消息生成脚本
          cat > generate-message.js << 'EOF'
          const https = require('https');
          
          // 节假日数据
          const holidays = [
            { name: "元旦", month: 1, day: 1 },
            { name: "春节", month: 2, day: 10 },
            { name: "清明节", month: 4, day: 4 },
            { name: "劳动节", month: 5, day: 1 },
            { name: "端午节", month: 6, day: 10 },
            { name: "中秋节", month: 9, day: 15 },
            { name: "国庆节", month: 10, day: 1 }
          ];
          
          // 计算距离下一个休假日的天数（包括周末）
          function daysUntilNextHoliday() {
            const today = new Date();
            const currentYear = today.getFullYear();
            
            // 创建今年所有节假日的日期对象
            const upcomingHolidays = holidays.map(holiday => {
              const date = new Date(currentYear, holiday.month - 1, holiday.day);
              return { ...holiday, date };
            });
            
            // 过滤出今年还未到的节假日
            const futureHolidays = upcomingHolidays.filter(holiday => holiday.date > today);
            
            // 计算本周末的日期（周六）
            const nextSaturday = new Date(today);
            const daysUntilSaturday = 6 - today.getDay(); // 0是周日，6是周六
            nextSaturday.setDate(today.getDate() + daysUntilSaturday);
            
            // 如果今年没有未到的节假日，则考虑明年的第一个节假日
            if (futureHolidays.length === 0) {
              const nextYearFirstHoliday = { ...holidays[0], date: new Date(currentYear + 1, holidays[0].month - 1, holidays[0].day) };
              
              // 比较下一个周六和下一个节假日哪个更近
              if (nextSaturday < nextYearFirstHoliday.date) {
                const timeDiff = nextSaturday.getTime() - today.getTime();
                const daysDiff = Math.ceil(timeDiff / (1000 * 3600 * 24));
                return { name: "周末", days: daysDiff };
              } else {
                const timeDiff = nextYearFirstHoliday.date.getTime() - today.getTime();
                const daysDiff = Math.ceil(timeDiff / (1000 * 3600 * 24));
                return { name: nextYearFirstHoliday.name, days: daysDiff };
              }
            }
            
            // 找到最近的一个节假日
            const nextHoliday = futureHolidays[0];
            
            // 比较下一个周六和下一个节假日哪个更近
            if (nextSaturday < nextHoliday.date) {
              const timeDiff = nextSaturday.getTime() - today.getTime();
              const daysDiff = Math.ceil(timeDiff / (1000 * 3600 * 24));
              return { name: "周末", days: daysDiff };
            } else {
              const timeDiff = nextHoliday.date.getTime() - today.getTime();
              const daysDiff = Math.ceil(timeDiff / (1000 * 3600 * 24));
              return { name: nextHoliday.name, days: daysDiff };
            }
          }
          
          // 格式化日期
          function formatDate(date) {
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const weekday = weekdays[date.getDay()];
            return `${year}年${month}月${day}日 ${weekday}`;
          }
          
          // 生成早间消息内容
          function generateMorningMessage() {
            const now = new Date();
            const currentDate = formatDate(now);
            const nextHoliday = daysUntilNextHoliday();
            const hour = now.getHours();
            
            // 根据当前小时数生成不同的问候语
            let timeGreeting = '';
            if (hour < 6) timeGreeting = '🌙 夜猫子，这么晚还不睡？';
            else if (hour < 9) timeGreeting = '🌅 早起的鸟儿有虫吃！';
            else if (hour < 12) timeGreeting = '🌞 上午好，元气满满！';
            else if (hour < 14) timeGreeting = '🍽️ 午饭时间到！';
            else if (hour < 18) timeGreeting = '☕ 下午茶时间！';
            else if (hour < 22) timeGreeting = '🌇 下班倒计时！';
            else timeGreeting = '😴 该休息啦！';
            
            // 生成有趣的星期相关语句
            const weekdays = ['周一综合症？不存在的！', '周二加油冲鸭！', '周三努力奋斗！', '周四坚持就是胜利！', '周五摸鱼快乐！', '周六放松一下～', '周日享受生活～'];
            const todayIndex = now.getDay();
            const weekdayMessage = weekdays[todayIndex];
            
            return `【摸鱼时间】${timeGreeting}
          
          📅 ${currentDate}
          🎉 距离下一个休假日(${nextHoliday.name})还有${nextHoliday.days}天
          
          ${weekdayMessage}
          
          🎯 今天的 KPI 也拦不住闪闪发光的你
          💪 摸鱼一下，更有干劲！
          
           🎵 今日BGM推荐：元气满满进行曲`;
          }
          
          // 生成消息内容
          const messageContent = generateMorningMessage();
          console.log(JSON.stringify({ content: messageContent }));
          EOF
          
          # 生成消息内容
          MESSAGE_JSON=$(node generate-message.js)
          MESSAGE_CONTENT=$(echo $MESSAGE_JSON | jq -r '.content')
          
          # 发送到钉钉
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"$MESSAGE_CONTENT\"}}" \
            ${{ env.DINGTALK_WEBHOOK }}

      - name: 发送午间消息
        if: (github.event.schedule == '30 4 * * 1-5') || (github.event_name == 'workflow_dispatch' && github.event.inputs.message_type == 'noon')
        run: |
          # 安装Node.js环境
          curl -sL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs
          
          # 创建消息生成脚本
          cat > generate-message.js << 'EOF'
          const https = require('https');
          
          // 格式化日期
          function formatDate(date) {
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const weekday = weekdays[date.getDay()];
            return `${year}年${month}月${day}日 ${weekday}`;
          }
          
          // 生成午间消息内容
          function generateNoonMessage() {
            const now = new Date();
            const currentTime = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            const currentDate = formatDate(now);
            const hour = now.getHours();
            const minutes = now.getMinutes();
            
            // 根据当前分钟数生成有趣的喝水提醒
            const waterTips = [
              '💧 喝水小贴士：一天8杯水，健康你我他',
              '🥤 喝水小贴士：温水最养胃，记得慢慢喝',
              '🚰 喝水小贴士：饭前饭后半小时喝水最健康',
              '🌊 喝水小贴士：小口频饮比大口猛灌更有效'
            ];
            const tip = waterTips[minutes % waterTips.length];
            
            return `【摸鱼提醒】叮咚！你的水杯在召唤你～ 🥤
          
          ⏰ ${currentTime} | ${currentDate}
          
          ${tip}
          
          🚶 起来走动走动，活动筋骨
          🧃 顺便干掉 300ml 水，给大脑也洗个澡吧
          💚 摸鱼也要注意健康哦～
          
           🎵 今日午间单曲循环：放松小调`;
          }
          
          // 生成消息内容
          const messageContent = generateNoonMessage();
          console.log(JSON.stringify({ content: messageContent }));
          EOF
          
          # 生成消息内容
          MESSAGE_JSON=$(node generate-message.js)
          MESSAGE_CONTENT=$(echo $MESSAGE_JSON | jq -r '.content')
          
          # 发送到钉钉
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"$MESSAGE_CONTENT\"}}" \
            ${{ env.DINGTALK_WEBHOOK }}

      - name: 发送下午消息
        if: (github.event.schedule == '0 7 * * 1-5') || (github.event_name == 'workflow_dispatch' && github.event.inputs.message_type == 'afternoon')
        run: |
          # 安装Node.js环境
          curl -sL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs
          
          # 创建消息生成脚本
          cat > generate-message.js << 'EOF'
          const https = require('https');
          
          // 格式化日期
          function formatDate(date) {
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const weekday = weekdays[date.getDay()];
            return `${year}年${month}月${day}日 ${weekday}`;
          }
          
          // 生成下午消息内容
          function generateAfternoonMessage() {
            const now = new Date();
            const currentTime = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            const currentDate = formatDate(now);
            const hour = now.getHours();
            
            // 根据当前时间生成不同的下午鼓励语
            const afternoonMessages = [
              '☕ 咖啡续命，梦想加油！',
              '⚡ 电量不足？来点下午茶充电吧！',
              '🌈 困意来袭？想想下班后的快乐时光！',
              '🚀 困了累了？想想升职加薪走上人生巅峰！'
            ];
            const afternoonMsg = afternoonMessages[(hour - 12) % afternoonMessages.length];
            
            return `【摸鱼鼓励】下午加油！ 💪
          
          ⏰ ${currentTime} | ${currentDate}
          
          ${afternoonMsg}
          
          ⏳ 再坚持一会儿，今天的王者就是你
          🔥 摸鱼也要努力工作！
          
           🎵 今日提神神曲：战斗进行曲`;
          }
          
          // 生成消息内容
          const messageContent = generateAfternoonMessage();
          console.log(JSON.stringify({ content: messageContent }));
          EOF
          
          # 生成消息内容
          MESSAGE_JSON=$(node generate-message.js)
          MESSAGE_CONTENT=$(echo $MESSAGE_JSON | jq -r '.content')
          
          # 发送到钉钉
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"$MESSAGE_CONTENT\"}}" \
            ${{ env.DINGTALK_WEBHOOK }}

      - name: 发送下班消息
        if: (github.event.schedule == '0 9 * * 1-5') || (github.event_name == 'workflow_dispatch' && github.event.inputs.message_type == 'evening')
        run: |
          # 安装Node.js环境
          curl -sL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs
          
          # 创建消息生成脚本
          cat > generate-message.js << 'EOF'
          const https = require('https');
          
          // 格式化日期
          function formatDate(date) {
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const weekday = weekdays[date.getDay()];
            return `${year}年${month}月${day}日 ${weekday}`;
          }
          
          // 生成下班消息内容
          function generateEveningMessage() {
            const now = new Date();
            const currentTime = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            const currentDate = formatDate(now);
            const hour = now.getHours();
            
            // 根据当前时间生成不同的下班提醒
            const eveningMessages = [
              '🎊 终于要下班啦！收拾东西准备撤退！',
              '🎉 下班时间到！快乐时光即将开始！',
              '🎈 工作结束！该好好犒劳自己了！',
              '🌙 一天辛苦了！该休息充电啦！'
            ];
            const eveningMsg = eveningMessages[(hour - 17) % eveningMessages.length];
            
            return `【摸鱼结束】下班啦！ 🎉
          
          ⏰ ${currentTime} | ${currentDate}
          
          ${eveningMsg}
          
          🗑️ 把今天的烦恼留在工位
          🎒 把快乐装进背包
          😄 下班见～
          💪 摸鱼了一天，辛苦了！
          
           🎵 今日下班BGM：轻松愉快进行曲`;
          }
          
          // 生成消息内容
          const messageContent = generateEveningMessage();
          console.log(JSON.stringify({ content: messageContent }));
          EOF
          
          # 生成消息内容
          MESSAGE_JSON=$(node generate-message.js)
          MESSAGE_CONTENT=$(echo $MESSAGE_JSON | jq -r '.content')
          
          # 发送到钉钉
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"$MESSAGE_CONTENT\"}}" \
            ${{ env.DINGTALK_WEBHOOK }}